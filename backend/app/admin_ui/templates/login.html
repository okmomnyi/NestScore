<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NestScore — Admin Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-box {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
        }

        h1 {
            font-size: 1.3rem;
            color: #38bdf8;
            margin-bottom: 28px;
            font-weight: 600;
        }

        label {
            font-size: 0.8rem;
            color: #94a3b8;
            display: block;
            margin-bottom: 6px;
        }

        input[type="password"] {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .error {
            background: #450a0a;
            color: #f87171;
            border: 1px solid #7f1d1d;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h1>🏠 NestScore</h1>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="post">
            <label for="password">Admin Password</label>
            <input type="password" id="password" name="password" autofocus />
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>

</html>
