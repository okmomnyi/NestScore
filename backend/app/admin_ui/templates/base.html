<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NestScore Admin{% endblock %}</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Alpine.js for interactivity -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <!-- Chart.js for data visualization -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
            success: { 500: '#10b981', 600: '#059669' },
            warning: { 500: '#f59e0b', 600: '#d97706' },
            danger: { 500: '#ef4444', 600: '#dc2626' },
          }
        }
      }
    }
  </script>
  
  <style>
    [x-cloak] { display: none !important; }
    .chart-container { position: relative; height: 300px; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <!-- Navigation -->
  <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-8">
          <a href="{{ admin_path }}/" class="flex items-center gap-2 text-xl font-bold text-blue-400 hover:text-blue-300 transition">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span>NestScore Admin</span>
          </a>
          <div class="hidden md:flex items-center gap-1">
            <a href="{{ admin_path }}/" class="px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition flex items-center gap-2">
              <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
              Dashboard
            </a>
            <a href="{{ admin_path }}/reviews" class="px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition flex items-center gap-2">
              <i data-lucide="message-square" class="w-4 h-4"></i>
              Reviews
            </a>
            <a href="{{ admin_path }}/plots" class="px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition flex items-center gap-2">
              <i data-lucide="map-pin" class="w-4 h-4"></i>
              Plots
            </a>
            <a href="{{ admin_path }}/disputes" class="px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition flex items-center gap-2">
              <i data-lucide="alert-triangle" class="w-4 h-4"></i>
              Disputes
            </a>
            <a href="{{ admin_path }}/suggestions" class="px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition flex items-center gap-2">
              <i data-lucide="lightbulb" class="w-4 h-4"></i>
              Suggestions
            </a>
            <a href="{{ admin_path }}/audit" class="px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition flex items-center gap-2">
              <i data-lucide="file-text" class="w-4 h-4"></i>
              Audit Log
            </a>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <div class="hidden sm:block text-sm text-slate-400">
            <i data-lucide="shield-check" class="w-4 h-4 inline"></i>
            Admin
          </div>
          <form method="post" action="{{ admin_path }}/logout" class="inline">
            <button type="submit" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-lg text-sm font-medium transition flex items-center gap-2">
              <i data-lucide="log-out" class="w-4 h-4"></i>
              Logout
            </button>
          </form>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Initialize Lucide Icons -->
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
