{% extends "base.html" %}
{% block content %}
<h1>Plot Suggestions</h1>
<div class="card" style="padding:0;">
    <table>
        <thead>
            <tr>
                <th>Suggested Name</th>
                <th>Area</th>
                <th>Notes</th>
                <th>Submitted</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for s in suggestions %}
            <tr>
                <td>{{ s.suggested_name }}</td>
                <td>{{ s.area }}</td>
                <td class="truncate">{{ s.notes or '—' }}</td>
                <td>{{ s.created_at.strftime('%Y-%m-%d') }}</td>
                <td style="white-space:nowrap;">
                    <form method="post" action="{{ admin_path }}/suggestions/{{ s.id }}/approve" class="inline">
                        <button type="submit" class="btn btn-success">Approve</button>
                    </form>
                    <form method="post" action="{{ admin_path }}/suggestions/{{ s.id }}/reject" class="inline">
                        <button type="submit" class="btn btn-danger">Reject</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="5" style="color:#64748b;text-align:center;padding:32px;">No pending suggestions.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
