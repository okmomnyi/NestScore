# ============================================================
# Nginx — NestScore reverse proxy configuration
# Place at: /etc/nginx/sites-available/nestscore
# Enable: ln -s /etc/nginx/sites-available/nestscore /etc/nginx/sites-enabled/
# ============================================================

# Rate limiting zone — first line of defence
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=reviews:10m rate=5r/m;

# Redirect all HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name nestscore.co.ke www.nestscore.co.ke;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nestscore.co.ke www.nestscore.co.ke;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/nestscore.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nestscore.co.ke/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src https://challenges.cloudflare.com; img-src 'self' data: https://*.tile.openstreetmap.org; connect-src 'self';" always;

    # Request size limit
    client_max_body_size 1m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # Admin — IP allowlist enforced here (extra defence; FastAPI also enforces it)
    # Replace with your VPN IP(s)
    location ~ ^/manage {
        allow 10.0.0.0/8;       # VPN subnet
        allow 127.0.0.1;
        deny all;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Review submission — tighter rate limit at Nginx layer
    location /api/reviews {
        limit_req zone=reviews burst=10 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # FastAPI Backend — all /api and /health routes
    location ~ ^/(api|health|docs) {
        limit_req zone=general burst=30 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Next.js Frontend — all other requests
    location / {
        limit_req zone=general burst=50 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
